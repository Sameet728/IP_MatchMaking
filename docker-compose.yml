version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: ipcos-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ipcos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ipcos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API Service (Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ipcos-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      - PORT=${BACKEND_PORT:-4000}
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-ipcos}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
      - UPLOAD_DIR=${UPLOAD_DIR:-./uploads}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    volumes:
      - ./backend:/app
      - /app/node_modules
    # Ensure database is healthy before running migrations/seeding and starting
    depends_on:
      db:
        condition: service_healthy
    # Wait for PG, apply Prisma schema, seed demo data, and run server
    command: sh -c "npx prisma db push && npm run db:seed && npm run dev"

  # Frontend UI Service (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: ipcos-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

# Persistent Volumes
volumes:
  pgdata:
    driver: local
